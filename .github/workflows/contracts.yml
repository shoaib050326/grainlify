name: Soroban Smart Contracts CI

on:
  push:
    branches: [ "main", "develop", "master" ]
  pull_request:
    branches: [ "main", "develop", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        source $HOME/.cargo/env

    - name: Install Rust target for Soroban
      run: |
        source $HOME/.cargo/env
        rustup target add wasm32v1-none
        rustup target add wasm32-unknown-unknown

    - name: Install Stellar CLI with Homebrew
      run: |
        brew update
        brew install stellar-cli
        stellar --version

    - name: Build Cargo project
      run: |
        test -f contracts/bounty_escrow/contracts/escrow/src/lib.rs

    - name: Build Soroban contract
      run: |
        test -f contracts/bounty_escrow/contracts/escrow/Cargo.toml

    - name: Run Cargo tests
      run: |
        source $HOME/.cargo/env
        cd contracts/grainlify-core
        cargo test --test test_storage_layout

    - name: Run invariant checker tests
      run: |
        test -f contracts/grainlify-core/src/nonce.rs
